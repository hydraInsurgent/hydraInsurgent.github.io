# Deploy the Astro site to GitHub Pages on every push to main.
# Split into two jobs: build (creates the artifact) and deploy (publishes it).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job 1: Build the Astro site and upload the artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with Astro
        uses: withastro/action@v3
        # Builds the site, runs `astro build`, and uploads dist/ as a Pages artifact

  # Job 2: Deploy the uploaded artifact to GitHub Pages
  deploy:
    needs: build          # waits for the build job to finish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
